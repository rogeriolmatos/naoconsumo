<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fliperama da Família — Escolha seu jogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Karla:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --fundo:#120b1e;
    --neon1:#ffc93c;
    --neon2:#ff4d8d;
    --neon3:#4dc9ff;
    --creme:#fdf3e3;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:
      radial-gradient(900px 500px at 20% -10%, #2a1640 0%, transparent 60%),
      radial-gradient(900px 500px at 85% 110%, #3a1030 0%, transparent 60%),
      var(--fundo);
    color:var(--creme);
    font-family:'Karla',sans-serif;
    min-height:100vh;
  }
  /* ---------- MENU ---------- */
  #menu{
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:26px;
    padding:30px 16px;text-align:center;
  }
  #menu h1{
    font-family:'Fraunces',serif;font-weight:900;
    font-size:clamp(2rem,7vw,3.6rem);line-height:1.05;color:#fff;
  }
  #menu h1 span{color:var(--neon1)}
  #menu .sub{color:rgba(253,243,227,.7);max-width:52ch}
  .canais{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;width:min(1080px,94vw);
  }
  .canal{
    text-align:left;color:var(--creme);cursor:pointer;
    border-radius:20px;padding:26px 24px;
    border:2px solid rgba(255,255,255,.15);
    transition:transform .18s, box-shadow .2s, border-color .2s;
    position:relative;overflow:hidden;
  }
  .canal:hover,.canal:focus-visible{transform:translateY(-6px) scale(1.01);outline:none}
  .canal .tag{
    display:inline-block;font-size:.7rem;font-weight:800;letter-spacing:.22em;
    text-transform:uppercase;border-radius:999px;padding:4px 12px;margin-bottom:12px;
  }
  .canal h2{font-family:'Fraunces',serif;font-size:1.6rem;color:#fff;margin-bottom:8px}
  .canal p{font-size:.95rem;color:rgba(253,243,227,.8);line-height:1.5}
  .canal .emoji{font-size:2.4rem;margin-bottom:8px}
  .canal .play{
    margin-top:16px;font-weight:800;font-size:.9rem;letter-spacing:.1em;text-transform:uppercase;
  }
  #canal-folga{background:linear-gradient(160deg,#0f3438,#14454a)}
  #canal-folga:hover{border-color:#ffc93c;box-shadow:0 16px 40px rgba(255,201,60,.2)}
  #canal-folga .tag{background:#ffc93c;color:#0c2a2d}
  #canal-folga .play{color:#ffc93c}
  #canal-novela{background:linear-gradient(160deg,#26101f,#3a1a30)}
  #canal-novela:hover{border-color:#ff4d8d;box-shadow:0 16px 40px rgba(255,77,141,.25)}
  #canal-novela .tag{background:#ff4d8d;color:#fff}
  #canal-novela .play{color:#ff4d8d}
  #canal-mala{background:linear-gradient(160deg,#0d2038,#123152)}
  #canal-mala:hover{border-color:#4dc9ff;box-shadow:0 16px 40px rgba(77,201,255,.25)}
  #canal-mala .tag{background:#4dc9ff;color:#0d2038}
  #canal-mala .play{color:#4dc9ff}
  #menu .rodape{font-size:.78rem;color:rgba(253,243,227,.4)}

  /* ---------- ÁREA DO JOGO ---------- */
  #arena{display:none;position:fixed;inset:0;z-index:10;background:var(--fundo)}
  #arena.on{display:block}
  #quadro{width:100%;height:100%;border:0;display:block}
  #voltar{
    position:fixed;top:12px;left:12px;z-index:20;
    font-family:'Karla',sans-serif;font-weight:800;font-size:.85rem;
    color:var(--fundo);background:var(--creme);
    border:none;border-radius:999px;padding:9px 18px;cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,.45);opacity:.92;
    transition:transform .15s;
  }
  #voltar:hover{transform:translateY(-2px)}
  #voltar:focus-visible{outline:3px solid var(--neon1);outline-offset:2px}
</style>
</head>
<body>

<!-- ============================================================
     MENU INICIAL — escolha seu jogo
     ============================================================ -->
<main id="menu">
  <h1>🕹️ Fliperama da <span>Família</span></h1>
  <p class="sub">Três jogos, um botão de escolha. Pais desesperados por folga, uma novela de conflito familiar e uma doutoranda que perde a mala no mundo inteiro. Escolha seu canal:</p>

  <div class="canais">
    <button class="canal" id="canal-folga" onclick="abrirJogo('tpl-folga')">
      <div class="emoji">👨‍👩‍👦💨</div>
      <span class="tag">Canal 1 · Comédia</span>
      <h2>Operação Folga</h2>
      <p>Marcel e Gabriela só querem UMA noite sem o Juca. Mas Melise, Henrique, Andriele, Cristiane e Rogério fogem, se escondem e inventam desculpas. Empurre o bebê em alguém antes que a paciência acabe!</p>
      <div class="play">▶ Jogar</div>
    </button>

    <button class="canal" id="canal-novela" onclick="abrirJogo('tpl-novela')">
      <div class="emoji">📺🔥</div>
      <span class="tag">Canal 2 · Dramalhão</span>
      <h2>Casa Dividida</h2>
      <p>Uma micro-novela jogável em 3 episódios: Vera arranca placas de VENDE-SE, Cristiane foge do oficial de justiça e Cândido tenta (e falha) recomeçar. No final, você decide o destino da família.</p>
      <div class="play">▶ Assistir jogando</div>
    </button>

    <button class="canal" id="canal-mala" onclick="abrirJogo('tpl-mala')">
      <div class="emoji">🧳✈️</div>
      <span class="tag">Canal 3 · Aventura</span>
      <h2>Cadê Minha Mala?</h2>
      <p>Melise, doutoranda de TI da UFSC, viaja a Europa com bolsa de pesquisa e faz trilha nos Alpes. Só tem um problema: a mala dela FOGE. Ache a mala rosa em 5 fases antes que ela siga viagem sozinha!</p>
      <div class="play">▶ Embarcar</div>
    </button>
  </div>

  <p class="rodape">Feito com Claude · três jogos em um só arquivo</p>
</main>

<!-- ============================================================
     ARENA — onde o jogo escolhido roda (iframe isolado)
     ============================================================ -->
<div id="arena">
  <button id="voltar" onclick="voltarMenu()">← Menu</button>
  <iframe id="quadro" title="Jogo"></iframe>
</div>

<script>
  function abrirJogo(tplId){
    const tpl = document.getElementById(tplId);
    const frame = document.getElementById('quadro');
    frame.srcdoc = '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body>' + tpl.innerHTML + '</body></html>';
    document.getElementById('arena').classList.add('on');
    document.getElementById('menu').style.display = 'none';
  }
  function voltarMenu(){
    document.getElementById('quadro').srcdoc = '';
    document.getElementById('arena').classList.remove('on');
    document.getElementById('menu').style.display = 'flex';
  }
</script>

<!-- ============================================================
     JOGO 1: OPERAÇÃO FOLGA (template inerte, roda no iframe)
     ============================================================ -->
<template id="tpl-folga">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Karla:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --fundo:#0f3438;
    --fundo-2:#14454a;
    --coral:#ff6b57;
    --sol:#ffc93c;
    --creme:#fdf3e3;
    --agua:#5fd0c7;
    --tinta:#0c2a2d;
    --sombra:rgba(0,0,0,.35);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:
      radial-gradient(ellipse 120% 55% at 50% -12%, var(--fundo-2), transparent 70%),
      var(--fundo);
    color:var(--creme);
    font-family:'Karla',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:56px 14px 70px;line-height:1.5;
  }
  h1,h2,h3{font-family:'Fraunces',serif}
  button{font-family:'Karla',sans-serif;cursor:pointer}
  button:focus-visible{outline:3px solid var(--sol);outline-offset:2px}

  .palco{width:min(760px,96vw)}

  .hud{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.1);
    border-radius:16px;padding:12px 18px;margin-bottom:16px;
  }
  .hud .casal{font-size:1.7rem}
  .hud .info{flex:1;min-width:180px}
  .hud .nome{font-weight:800;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:var(--sol)}
  .trilho{height:12px;border-radius:999px;background:rgba(0,0,0,.35);overflow:hidden;margin-top:4px}
  .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#d4523d,var(--coral),var(--sol));transition:width .6s ease}
  .hud .rodada{font-weight:800;color:var(--agua);white-space:nowrap}

  .alvos{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:16px}
  .alvo{
    text-align:left;color:var(--creme);
    background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
    border:2px solid rgba(255,255,255,.14);border-radius:18px;
    padding:16px;transition:transform .15s,border-color .2s,box-shadow .2s;
    position:relative;overflow:hidden;
  }
  .alvo:hover:not(:disabled){transform:translateY(-4px);border-color:var(--sol);box-shadow:0 12px 28px var(--sombra)}
  .alvo.selecionado{border-color:var(--coral);box-shadow:0 0 0 3px rgba(255,107,87,.3)}
  .alvo:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.6)}
  .alvo .cenario{font-size:2rem}
  .alvo .quem{font-family:'Fraunces',serif;font-weight:700;font-size:1.12rem;margin:6px 0 2px;color:#fff}
  .alvo .onde{font-size:.82rem;color:var(--agua)}
  .alvo .resist{margin-top:10px}
  .alvo .resist .rotulo{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(253,243,227,.6)}
  .alvo .trilho{height:9px;background:rgba(0,0,0,.4)}
  .alvo .fill{background:linear-gradient(90deg,#2e8f86,var(--agua))}
  .alvo .fugindo{position:absolute;top:10px;right:-40px;font-size:1.5rem;animation:foge 1.2s ease forwards}
  @keyframes foge{from{right:-40px;opacity:1}to{right:110%;opacity:.2}}
  @media (prefers-reduced-motion:reduce){.alvo .fugindo{animation:none;right:10px}}

  .painel{
    background:linear-gradient(180deg,#17454b,#123a3f);
    border:1px solid rgba(255,255,255,.12);border-radius:18px;
    padding:22px 24px;box-shadow:0 16px 40px var(--sombra);
  }
  .painel h2{font-size:1.25rem;color:var(--sol);margin-bottom:4px}
  .painel .dica{font-size:.9rem;color:rgba(253,243,227,.65);margin-bottom:14px}
  .taticas{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
  .tatica{
    text-align:left;color:var(--creme);
    background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.16);
    border-radius:12px;padding:12px 14px;transition:border-color .2s,background .2s,transform .12s;
  }
  .tatica:hover:not(:disabled){border-color:var(--coral);background:rgba(255,107,87,.1);transform:translateX(3px)}
  .tatica:disabled{opacity:.4;cursor:not-allowed}
  .tatica .nome{font-weight:800}
  .tatica .custo{font-size:.78rem;color:var(--agua);margin-top:2px}

  .cena{
    margin-top:16px;background:rgba(0,0,0,.25);border-radius:14px;
    border:1px dashed rgba(95,208,199,.4);padding:16px 18px;
    animation:pop .35s ease both;
  }
  @keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
  .cena .balao{margin:6px 0;font-size:1rem}
  .cena .balao b{color:var(--sol)}
  .cena .balao.amigo b{color:var(--agua)}
  .cena .dano{margin-top:10px;font-weight:800}
  .cena .dano.bom{color:var(--sol)} .cena .dano.ruim{color:var(--coral)}
  .btn-grande{
    font-family:'Fraunces',serif;font-weight:700;font-size:1.05rem;
    color:var(--tinta);background:var(--sol);
    border:none;border-radius:999px;padding:12px 30px;
    transition:transform .15s,box-shadow .2s;
  }
  .btn-grande:hover{transform:translateY(-2px) rotate(-1deg);box-shadow:0 10px 24px rgba(255,201,60,.35)}
  .btn-coral{background:var(--coral);color:#fff}

  .tela{
    background:linear-gradient(180deg,#17454b,#123a3f);
    border:1px solid rgba(255,255,255,.12);border-radius:22px;
    padding:44px 34px;text-align:center;box-shadow:0 20px 50px var(--sombra);
    animation:pop .4s ease both;
  }
  .tela h1{font-size:clamp(1.9rem,6vw,3rem);font-weight:900;color:#fff;line-height:1.12}
  .tela h1 em{font-style:italic;color:var(--sol)}
  .tela .grande-emoji{font-size:3.4rem;margin-bottom:10px}
  .tela p{color:rgba(253,243,227,.85);max-width:56ch;margin:14px auto 0}
  .tela .selo{
    display:inline-block;font-size:.72rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;
    border:2px solid var(--coral);color:var(--coral);border-radius:999px;padding:5px 16px;margin-bottom:14px;
  }
  .modos{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:26px}
  .placar{margin-top:18px;font-size:.85rem;color:rgba(253,243,227,.55)}
  .elenco{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:20px}
  .elenco span{
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
    border-radius:999px;padding:6px 14px;font-size:.85rem;
  }
</style>

<main class="palco" id="palco" aria-live="polite"></main>

<script>
const $ = s => document.getElementById(s);
const rnd = a => a[Math.floor(Math.random() * a.length)];
const clamp = (v,min,max) => Math.max(min, Math.min(max, v));

const TATICAS = [
  { id:'surpresa', emoji:'🚪', nome:'Visita surpresa com mala pronta', custo:12, dano:18,
    desc:'Aparecer sem avisar, bolsa do bebê no ombro, sorriso no rosto.',
    falaPais:['"Olha quem passou pra dar um OI! E olha o que ele trouxe: a malinha!"','"A gente tava passando aqui na frente, coincidentemente com tudo do Juca no carro…"'] },

    falaPais:['"Segura ele um segundinho— VAMBORA GABRIELA, ACELERA, ACELERAAA!"'] }
];

let J = null;
function novoJogo(dificil){
  J = {
    dificil,
    bebe: dificil ? 'os gêmeos Juca & Théo' : 'o Juca',
    bebeEmoji: dificil ? '👶👶' : '👶',
    paciencia: 100,
    rodada: 1,
    alvo: null,
    amigos: novosAmigos(dificil),
    tentativas: 0
  };
}

function telaAbertura(){
  $('palco').innerHTML = `
    <div class="tela">
      <div class="grande-emoji">👨‍👩‍👦💨</div>
      <h1>Operação <em>Folga</em></h1>
      <p><strong>O bebê nasceu!</strong> Marcel e Gabriela amam o Juca mais que tudo. Mas faz 8 meses que eles não veem um filme inteiro, não jantam sem purê no cabelo e não terminam uma frase.</p>
      <p>A missão é simples: <strong>empurrar o Juca pra casa de um amigo</strong> e ganhar UMA noite de folga. O problema? Os amigos fogem, se escondem, inventam obra, alergia e compromisso com o pôr do sol.</p>
      <div class="elenco">
        <span>🏠 Rogério & Cristiane — casa com quintal</span>
        <span>🏢 Andriele & Henrique — apartamento</span>
        <span>🏖️ Melise — solteira na praia</span>
      </div>
      <p style="font-size:.9rem">Cada amigo tem uma <strong>fraqueza secreta</strong> e uma tática contra a qual é imune. Descubra na base da insistência — mas cuidado: a paciência de vocês (e a fralda do Juca) não dura pra sempre.</p>
      <div class="modos">
        <button class="btn-grande" onclick="comecar(false)">Jogar com 1 filho 👶</button>
        <button class="btn-grande btn-coral" onclick="comecar(true)">Modo GÊMEOS 👶👶 (difícil)</button>
      </div>
    </div>`;
}

function comecar(dificil){ novoJogo(dificil); render(); }

function render(msgCena){
  const alvosHtml = J.amigos.map(a => `
    <button class="alvo ${J.alvo===a.id?'selecionado':''}" ${a.resist<=0?'disabled':''} onclick="escolherAlvo('${a.id}')">
      <div class="cenario">${a.cenario}</div>
      <div class="quem">${a.quem}</div>
      <div class="onde">${a.onde}${a.longe?' · <b>viagem longa (+8 de paciência por tentativa)</b>':''}</div>
      <div class="resist">
        <div class="rotulo">Resistência à babá-gem</div>
        <div class="trilho"><div class="fill" style="width:${clamp(a.resist/a.max*100,0,100)}%"></div></div>
      </div>
      ${a.fugiu ? `<div class="fugindo">🏃💨</div>` : ''}
    </button>`).join('');

  const alvoSel = J.amigos.find(a => a.id === J.alvo);
  const taticasHtml = alvoSel ? TATICAS.map(t => `
    <button class="tatica" ${J.paciencia < t.custo + (alvoSel.longe?8:0) && !t.especial ? 'disabled':''} onclick="atacar('${t.id}')">
      <div class="nome">${t.emoji} ${t.nome}</div>
      <div class="custo">${t.especial ? 'Custo: sua dignidade · 25% de vitória instantânea' : `Custo: ${t.custo + (alvoSel.longe?8:0)} de paciência`}</div>
      <div style="font-size:.82rem;color:rgba(253,243,227,.6);margin-top:2px">${t.desc}</div>
    </button>`).join('') : '';

  $('palco').innerHTML = `
    <div class="hud">
      <div class="casal">😵‍💫👩‍🦱 ${J.bebeEmoji}</div>
      <div class="info">
        <div class="nome">Paciência de Marcel & Gabriela</div>
        <div class="trilho"><div class="fill" style="width:${J.paciencia}%"></div></div>
      </div>
      <div class="rodada">Tentativa ${J.tentativas} · carregando ${J.bebe}</div>
    </div>

    <div class="alvos">${alvosHtml}</div>

    <div class="painel">
      ${alvoSel ? `
        <h2>Alvo: ${alvoSel.quem}</h2>
        <div class="dica">Escolha a tática. Cada amigo tem uma fraqueza (dano dobrado) e uma imunidade (dano pela metade). Descubra sofrendo.</div>
        <div class="taticas">${taticasHtml}</div>
      ` : `
        <h2>Escolha a vítima… digo, o amigo 🎯</h2>
        <div class="dica">Clique em um dos amigos acima pra começar a ofensiva. Lembre: a Melise mora na praia — cada investida contra ela custa mais paciência (é longe, e ${J.bebe} chora no carro).</div>
      `}
      <div id="cena">${msgCena || ''}</div>
    </div>`;
}

function escolherAlvo(id){
  J.alvo = id;
  J.amigos.forEach(a => a.fugiu = false);
  render();
}

function atacar(tid){
  const t = TATICAS.find(x => x.id === tid);
  const a = J.amigos.find(x => x.id === J.alvo);
  J.tentativas++;

  if (t.especial){
    if (Math.random() < 0.25){
      a.resist = 0;
      return telaVitoria(a, true);
    }
    J.paciencia = clamp(J.paciencia - 25, 0, 100);
    a.resist = clamp(a.resist + 15, 0, a.max);
    a.fugiu = true;
    const cena = `
      <div class="cena">
        <div class="balao"><b>Marcel:</b> ${rnd(t.falaPais)}</div>
        <div class="balao amigo"><b>${a.quem}:</b> "EU VI VOCÊS PELO OLHO MÁGICO! NEM VEM!" 🔒</div>
        <div class="balao">${rnd(a.fugas)}</div>
        <div class="dano ruim">💥 Falhou feio! ${a.quem} trancou tudo (+15 de resistência) e a paciência de vocês despencou (−25). ${J.bebe.charAt(0).toUpperCase()+J.bebe.slice(1)} achou a correria divertidíssima.</div>
      </div>`;
    if (J.paciencia <= 0) return telaDerrota();
    return render(cena);
  }

  const custo = t.custo + (a.longe ? 8 : 0);
  J.paciencia = clamp(J.paciencia - custo, 0, 100);

  let mult = 1, nota = '';
  if (a.fraco === t.id){ mult = 1.9; nota = 'FRAQUEZA ATINGIDA! Dano dobrado! 🎯'; }
  if (a.forte === t.id){ mult = 0.45; nota = 'Imunidade! Eles conhecem esse golpe… dano pela metade. 🛡️'; }
  const dano = Math.round(t.dano * mult * (0.85 + Math.random() * 0.3));
  a.resist = clamp(a.resist - dano, 0, a.max);
  a.fugiu = mult < 1;

  if (a.resist <= 0) return telaVitoria(a, false);

  const reacao = a.fraco === t.id
    ? a.fraqueza_cena
    : rnd(a.desculpas);

  const cena = `
    <div class="cena">
      <div class="balao"><b>Marcel & Gabriela:</b> ${rnd(t.falaPais)}</div>
      <div class="balao amigo"><b>${a.quem}:</b> ${reacao}</div>
      ${mult < 1 ? `<div class="balao">${rnd(a.fugas)}</div>` : ''}
      <div class="dano ${mult>=1?'bom':'ruim'}">${t.emoji} Resistência de ${a.quem}: −${dano} ${nota ? '· ' + nota : ''}</div>
    </div>`;

  if (J.paciencia <= 0) return telaDerrota();
  render(cena);
}

function telaVitoria(a, foiFuga){
  const ep = J.dificil ? a.epilogo_gemeos : a.epilogo.texto;
  $('palco').innerHTML = `
    <div class="tela">
      <div class="selo">Vitória · noite de folga garantida</div>
      <div class="grande-emoji">🍿🥂</div>
      <h1>${a.epilogo.titulo}</h1>
      ${foiFuga ? `<p><strong>A técnica do "segura um segundinho" FUNCIONOU!</strong> ${a.quem} ficou parado(a) na porta segurando ${J.bebe} enquanto o carro de vocês cantava pneu na esquina.</p>` : ''}
      <p>${ep}</p>
      <p><strong>E Marcel e Gabriela?</strong> Foram ao cinema depois de 8 meses. Escolheram o filme, compraram pipoca gigante, sentaram na melhor fileira… e <strong>dormiram nos primeiros 10 minutos</strong>, abraçados, babando na poltrona. Melhor noite das vidas deles.</p>
      <div class="placar">Conquistado em ${J.tentativas} tentativa(s) · paciência restante: ${J.paciencia}% · modo: ${J.dificil ? 'GÊMEOS 👶👶' : '1 filho 👶'}</div>
      <div class="modos">
        <button class="btn-grande" onclick="telaAbertura()">Jogar de novo ↺</button>
        ${!J.dificil ? `<button class="btn-grande btn-coral" onclick="comecar(true)">Encarar o modo GÊMEOS 👶👶</button>` : ''}
      </div>
    </div>`;
}

function telaDerrota(){
  $('palco').innerHTML = `
    <div class="tela">
      <div class="selo" style="border-color:var(--agua);color:var(--agua)">Derrota · paciência esgotada</div>
      <div class="grande-emoji">📺${J.bebeEmoji}</div>
      <h1>A noite de folga <em>era um sonho</em></h1>
      <p>Os amigos venceram. Melise segue zen na praia, Rogério e Cristiane "em obra", Andriele e Henrique protegidos pelo síndico. Marcel e Gabriela voltaram pra casa derrotados, exaustos…</p>
      <p>…e passaram a noite assistindo <strong>Galinha Pintadinha pela 947ª vez</strong>, com ${J.bebe} dançando no meio da sala. E sabe o pior? Lá pela terceira música, os dois estavam cantando junto e rindo. <strong>Malditos sejam. Era a folga que eles queriam, e foi a melhor noite mesmo assim.</strong></p>
      <div class="placar">Tentativas: ${J.tentativas} · modo: ${J.dificil ? 'GÊMEOS 👶👶' : '1 filho 👶'}</div>
      <div class="modos">
        <button class="btn-grande" onclick="telaAbertura()">Tentar de novo ↺</button>
      </div>
    </div>`;
}

telaAbertura();
</script>
</template>

          <div class="icone">👮</div>
          <div class="estado" id="oficial-estado">DE COSTAS</div>
        </div>

        <div class="aviso-pego" id="pego">
          <div>"A SENHORITA ESTÁ INTIMADA!"</div>
          <button class="btn" onclick="Jogo2.reiniciar()">Tentar de novo</button>
        </div>
      </div>
    </section>

    <!-- FINAL -->
    <section id="tela-final" class="screen">
      <div style="font-size:40px">🌅</div>
      <h2 class="selo-final" id="final-titulo">FIM</h2>
      <p class="resumo-final" id="final-texto"></p>
      <p class="placar-final">Nível de drama da família: <span id="final-drama">0</span> 🔥</p>
      <button class="btn" onclick="location.reload()">↻ Reprisar a novela</button>
    </section>

  </div>
</div>
<p id="rodape">Feito com Claude · aperte F pra pagar o aluguel da Vera</p>

<script>
const $ = s => document.querySelector(s);
const Jogo = {
  drama: 0,
  candidoFoiHumilhado: 0,
  telaAtual: 'tela-titulo',
  proximo: null,

  mostrar(id){
    document.querySelectorAll('.screen').forEach(t=>t.classList.remove('on'));
    $('#'+id).classList.add('on');
    this.telaAtual = id;
  },
  addDrama(n){
    this.drama += n;
    $('#hud-drama').textContent = this.drama;
  },
  cartela(num, titulo, desc, depois){
    $('#cartela-num').textContent = num;
    $('#cartela-titulo').textContent = titulo;
    $('#cartela-desc').textContent = desc;
    this.proximo = depois;
    this.mostrar('tela-cartela');
  },
  depoisCartela(){ if(this.proximo) this.proximo(); },
  comecar(){
    this.cartela('EPISÓDIO 1', '"A Casa é Minha!"',
      'Vera acorda com barulho no jardim. Adivinha quem trouxe placas de VENDE-SE outra vez…',
      ()=> Dialogo.rodar(ROTEIRO.ep1_intro, ()=> Jogo1.iniciar()));
  }
};

const PERSONAGENS = {
  narrador:{nome:'NARRADOR', emoji:'📺', cor:'#F6E8D6'},
  vera:{nome:'VERA', emoji:'👩‍🦱', cor:'#E9B44C'},
  candido:{nome:'CÂNDIDO', emoji:'🕺', cor:'#FF4D8D'},
  cris:{nome:'CRISTIANE', emoji:'🙄', cor:'#35C4A8'},
  oficial:{nome:'OFICIAL DE JUSTIÇA', emoji:'👮', cor:'#E4484F'},
  date:{nome:'PRETENDENTE', emoji:'💃', cor:'#c9a0ff'}
};

const Dialogo = {
  fila:[], i:0, aoTerminar:null, digitando:null, escolhaAtiva:false,

  rodar(cenas, aoTerminar){
    this.fila = cenas; this.i = 0; this.aoTerminar = aoTerminar;
    Jogo.mostrar('tela-dialogo');
    this.exibir();
  },
  exibir(){
    const c = this.fila[this.i];
    if(!c){ this.escolhaAtiva=false; if(this.aoTerminar) this.aoTerminar(); return; }
    if(c.cenario) $('#cenario').textContent = c.cenario;
    if(c.drama){ Jogo.addDrama(c.drama); }

    const p = PERSONAGENS[c.p] || PERSONAGENS.narrador;
    const ret = $('#dlg-retrato');
    ret.textContent = p.emoji;
    ret.style.setProperty('--cor', p.cor);
    $('#dlg-quem').textContent = p.nome;
    $('#dlg-quem').style.setProperty('--cor', p.cor);
    $('#caixa').style.setProperty('--cor', p.cor);

    clearInterval(this.digitando);
    const alvo = $('#dlg-texto'); alvo.textContent = '';
    let j = 0;
    this.digitando = setInterval(()=>{
      alvo.textContent = c.t.slice(0, ++j);
      if(j >= c.t.length) clearInterval(this.digitando);
    }, 16);

    const esc = $('#escolhas');
    if(c.escolhas){
      this.escolhaAtiva = true;
      esc.style.display = 'flex';
      esc.innerHTML = '';
      c.escolhas.forEach(op=>{
        const b = document.createElement('button');
        b.className = 'opcao';
        b.textContent = op.rotulo;
        b.onclick = e => { e.stopPropagation(); esc.style.display='none'; this.escolhaAtiva=false; op.acao(); };
        esc.appendChild(b);
      });
    } else {
      esc.style.display = 'none';
    }
  },
  avancar(){
    if(this.escolhaAtiva) return;
    const c = this.fila[this.i];
    if(c && $('#dlg-texto').textContent.length < c.t.length){
      clearInterval(this.digitando);
      $('#dlg-texto').textContent = c.t;
      return;
    }
    this.i++; this.exibir();
  }
};

const ROTEIRO = {
  ep1_intro:[
    {p:'narrador', cenario:'🌅🏠', t:'Sete da manhã. O bairro ainda dorme. A casa da família — a famosa casa — resiste em pé, igual ao orgulho da Vera.'},
    {p:'vera', t:'Eu ouvi barulho de martelo. MARTELO. Se for o que eu tô pensando…', drama:1},
    {p:'candido', cenario:'🕺🪧', t:'Bom dia, Verinha! Só vim deixar umas plaquinhas. VENDE-SE. Metade dessa casa é minha, tá no papel!'},
    {p:'vera', t:'A única coisa que vai ser vendida aqui é essa sua cara de pau, Cândido!', drama:2},
    {p:'cris', cenario:'🙄☕', t:'(da janela) Gente… são SETE da manhã. Eu não assinei pra ser plateia disso.'},
    {p:'narrador', t:'MISSÃO DA VERA: arranque 10 placas de VENDE-SE antes que fixem no jardim. Cuidado: se 3 placas fixarem, a paciência dela acaba (e o episódio recomeça).'}
  ],
  ep1_fim:[
    {p:'vera', cenario:'💪🏠', t:'DEZ placas! Pode trazer mais cem, eu arranco cento e uma!', drama:1},
    {p:'candido', t:'Isso não fica assim! Eu vou… eu vou chamar a JUSTIÇA! A Cristiane vai ter que depor!'},
    {p:'cris', t:'Depor?! EU?! Eu só moro aqui, meu Deus. Eu nem escolhi essa família direito.', drama:2},
    {p:'narrador', t:'E assim, mais uma vez, a filha foi jogada no meio do fogo cruzado…'}
  ],
  ep2_intro:[
    {p:'narrador', cenario:'🛋️📄', t:'Dias depois. Um homem de crachá ronda a sala com um envelope na mão. A intimação para a audiência dos pais.'},
    {p:'oficial', t:'Cristiane? Cristianeee? Eu sei que a senhorita está em casa. Eu ouvi o barulho da geladeira.'},
    {p:'cris', t:'(sussurrando) Se ele não me entregar o papel, eu não fui intimada. É a lei. Eu acho. Eu vi num vídeo.', drama:1},
    {p:'narrador', t:'MISSÃO DA CRISTIANE: segure o botão para andar até a porta dos fundos 🚪 — mas SÓ quando o oficial estiver DE COSTAS. Se ele te ver andando… tchau, liberdade.'}
  ],
  ep2_fim:[
    {p:'cris', cenario:'🚪🏃‍♀️', t:'CONSEGUI! Adeus, audiência! Vou pra casa da vó comer bolo em paz.'},
    {p:'oficial', t:'(sozinho na sala) …Vinte anos de carreira. Perdi pra uma menina de pantufa.', drama:1},
    {p:'narrador', t:'Enquanto isso, do outro lado da cidade, Cândido se preparava para mais uma noite de… "superação".'}
  ],
  ep3_intro:[
    {p:'narrador', cenario:'🍷🕯️', t:'Restaurante à meia-luz. Cândido ajeita a camisa aberta até o terceiro botão. Hoje ele decidiu: vai virar a página.'},
    {p:'candido', t:'Hoje eu não falo da Vera. Nem da casa. Nem do processo. Hoje é sobre o FUTURO.', drama:1},
    {p:'narrador', t:'MISSÃO DO CÂNDIDO: sobreviva a 3 encontros escolhendo o que dizer. Spoiler: ele é o próprio inimigo.'}
  ],
  final_intro:[
    {p:'narrador', cenario:'🏠🌧️', t:'Domingo. Chove. Cristiane, cansada de fugir de oficial, de placa e de fofoca, faz o impensável: chama os dois pra mesma sala.'},
    {p:'cris', t:'Sentem. Os dois. Sem martelo, sem envelope, sem perfume de conquista.', drama:1},
    {p:'vera', t:'Se ele falar da casa, eu levanto.'},
    {p:'candido', t:'Se ela revirar o olho, eu levanto.'},
    {p:'cris', t:'NINGUÉM LEVANTA. Eu passei três episódios sendo colocada no meio da briga de vocês. Agora EU decido como isso termina.',
      escolhas:[
        {rotulo:'💥 "CHEGA! Vou gritar tudo que eu engoli em 20 anos!"', acao:()=>Final.encerrar('barraco')},
        {rotulo:'🧘 "Eu amo os dois. Mas eu não sou o campo de batalha de vocês."', acao:()=>Final.encerrar('limite')},
        {rotulo:'🧳 "Sabe de uma coisa? Resolvam sozinhos. Vou morar com a vó."', acao:()=>Final.encerrar('vo')}
      ]}
  ]
};

const Jogo1 = {
  pontos:0, vidas:3, spawner:null, ativo:false,
  iniciar(){
    this.pontos=0; this.vidas=3; this.ativo=true;
    $('#j1-pontos').textContent=0; $('#j1-vidas').textContent=3;
    $('#jardim').querySelectorAll('.placa').forEach(p=>p.remove());
    Jogo.mostrar('jogo1');
    this.spawn();
  },
  spawn(){
    if(!this.ativo) return;
    this.criarPlaca();
    const ritmo = Math.max(450, 1150 - this.pontos*60);
    this.spawner = setTimeout(()=>this.spawn(), ritmo);
  },
  criarPlaca(){
    const jardim = $('#jardim');
    const p = document.createElement('div');
    p.className='placa';
    const dur = Math.max(1.4, 2.6 - this.pontos*0.1);
    p.innerHTML = `<div class="tabua">VENDE-SE</div><div class="pau"></div><div class="tempo"><i style="animation-duration:${dur}s"></i></div>`;
    p.style.left = (8 + Math.random()*78) + '%';
    p.style.top  = (18 + Math.random()*58) + '%';
    let resolvida = false;
    const fixou = setTimeout(()=>{
      if(resolvida || !this.ativo) return;
      resolvida = true;
      p.remove();
      this.flutuar(p.style.left, p.style.top, 'FIXOU! 😤', true);
      this.vidas--; $('#j1-vidas').textContent = this.vidas;
      Jogo.addDrama(1);
      if(this.vidas <= 0) this.perdeu();
    }, dur*1000);
    p.onpointerdown = e =>{
      e.preventDefault();
      if(resolvida) return;
      resolvida = true; clearTimeout(fixou);
      p.remove();
      this.flutuar(p.style.left, p.style.top, '+1 🪧');
      this.pontos++; $('#j1-pontos').textContent = this.pontos;
      if(this.pontos >= 10) this.venceu();
    };
    jardim.appendChild(p);
  },
  flutuar(left, top, txt, ruim=false){
    const f = document.createElement('div');
    f.className = 'pontinho' + (ruim?' ruim':'');
    f.textContent = txt;
    f.style.left = left; f.style.top = top;
    $('#jardim').appendChild(f);
    setTimeout(()=>f.remove(), 700);
  },
  parar(){ this.ativo=false; clearTimeout(this.spawner); },
  venceu(){
    this.parar();
    Dialogo.rodar(ROTEIRO.ep1_fim, ()=>
      Jogo.cartela('EPISÓDIO 2', '"Ninguém Me Intima"',
        'O oficial de justiça está na sala. Cristiane só queria chegar na geladeira em paz.',
        ()=> Dialogo.rodar(ROTEIRO.ep2_intro, ()=> Jogo2.iniciar())));
  },
  perdeu(){
    this.parar();
    Dialogo.rodar([
      {p:'candido', cenario:'🪧🪧🪧', t:'Três placas fixadas! Amanhã tem visita de corretor, Verinha! HAHAHA!'},
      {p:'vera', t:'Ah, é assim? Então recomeça esse episódio que HOJE eu arranco tudo.', drama:1}
    ], ()=> this.iniciar());
  }
};

const Jogo2 = {
  progresso:0, estado:'costas', andando:false, loop:null, ciclo:null, ativo:false,
  iniciar(){
    Jogo.mostrar('jogo2');
    this.reiniciar();
    const btn = $('#btn-andar');
    btn.onpointerdown = e=>{e.preventDefault(); this.andando=true;};
    const soltar = ()=>{this.andando=false;};
    btn.onpointerup = soltar; btn.onpointercancel = soltar; btn.onpointerleave = soltar;
    window.onkeydown = e=>{ if(e.code==='Space'){e.preventDefault(); this.andando=true;} };
    window.onkeyup = e=>{ if(e.code==='Space') this.andando=false; };
  },
  reiniciar(){
    this.progresso=0; this.andando=false; this.ativo=true;
    $('#pego').style.display='none';
    this.atualizar();
    this.mudarEstado('costas');
    clearInterval(this.loop);
    this.loop = setInterval(()=>this.tick(), 90);
    this.agendarCiclo();
  },
  agendarCiclo(){
    clearTimeout(this.ciclo);
    if(!this.ativo) return;
    if(this.estado==='costas'){
      this.ciclo = setTimeout(()=>{ this.mudarEstado('virando');
        this.ciclo = setTimeout(()=>{ this.mudarEstado('olhando'); this.agendarCiclo(); }, 500);
      }, 1300 + Math.random()*1800);
    } else if(this.estado==='olhando'){
      this.ciclo = setTimeout(()=>{ this.mudarEstado('costas'); this.agendarCiclo(); }, 900 + Math.random()*1300);
    }
  },
  mudarEstado(s){
    this.estado = s;
    const o = $('#oficial');
    o.className = s;
    const rot = {costas:'DE COSTAS 🍃', virando:'VIRANDO… ⚠️', olhando:'OLHANDO!! 👀'};
    $('#oficial-estado').textContent = rot[s];
    $('#oficial .icone').textContent = s==='costas' ? '🚶' : '👮';
  },
  tick(){
    if(!this.ativo) return;
    if(this.andando){
      if(this.estado==='olhando'){ this.pego(); return; }
      this.progresso = Math.min(100, this.progresso + 1.6);
      this.atualizar();
      if(this.progresso >= 100) this.venceu();
    }
  },
  atualizar(){
    $('#trilha-fill').style.width = this.progresso + '%';
    $('#cris').style.left = (4 + this.progresso*0.82) + '%';
  },
  pego(){
    this.ativo=false; clearInterval(this.loop); clearTimeout(this.ciclo);
    Jogo.addDrama(1);
    $('#pego').style.display='flex';
  },
  venceu(){
    this.ativo=false; clearInterval(this.loop); clearTimeout(this.ciclo);
    window.onkeydown = window.onkeyup = null;
    Dialogo.rodar(ROTEIRO.ep2_fim, ()=>
      Jogo.cartela('EPISÓDIO 3', '"O Conquistador"',
        'Cândido jurou que hoje não fala da ex. O restaurante inteiro duvida.',
        ()=> Dialogo.rodar(ROTEIRO.ep3_intro, ()=> Jogo3.iniciar())));
  }
};

const Jogo3 = {
  encontro:0,
  dates:[
    {emoji:'💃', nome:'MÁRCIA', abertura:'Então, Cândido… me fala de você. O que te faz feliz?',
      certa:{rotulo:'😊 "Boa música, um bom papo… e recomeços."', reacao:'Márcia sorri. Milagre: Cândido pareceu um adulto funcional por 12 segundos.'},
      errada:{rotulo:'🏠 "Feliz mesmo eu vou ficar quando vender aquela casa. METADE é minha."', reacao:'Márcia pediu a conta antes da entrada chegar. Recorde da casa.'}},
    {emoji:'💁‍♀️', nome:'SOLANGE', abertura:'Adorei o restaurante! Você vem sempre aqui?',
      certa:{rotulo:'🍷 "Primeira vez. Guardei pra uma ocasião especial."', reacao:'Solange achou charmoso. Cândido quase estraga citando o valor da conta, mas segurou.'},
      errada:{rotulo:'💔 "Vinha com a Vera. Ela sentava AÍ. Nessa cadeira. Exatamente essa."', reacao:'Solange olhou pra cadeira, olhou pra ele, e simplesmente evaporou.'}},
    {emoji:'👩‍🎤', nome:'PATRÍCIA', abertura:'Seu perfil dizia "sem bagagem emocional". É verdade?',
      certa:{rotulo:'😅 "Todo mundo tem bagagem. A minha eu carrego sozinho."', reacao:'Patrícia aplaudiu a sinceridade. Primeira sobremesa dividida em 8 meses!'},
      errada:{rotulo:'📄 "Só uma açãozinha judicial. Aliás, você depõe? Preciso de testemunha."', reacao:'Patrícia fingiu uma ligação da tia. Não existia tia. Não existia ligação.'}}
  ],
  iniciar(){ this.encontro=0; Jogo.candidoFoiHumilhado=0; this.proximoDate(); },
  proximoDate(){
    if(this.encontro >= this.dates.length){ this.terminar(); return; }
    const d = this.dates[this.encontro];
    PERSONAGENS.date.nome = d.nome; PERSONAGENS.date.emoji = d.emoji;
    const opcoes = [
      {rotulo:d.certa.rotulo, acao:()=> this.resultado(d.certa.reacao, false)},
      {rotulo:d.errada.rotulo, acao:()=> this.resultado(d.errada.reacao, true)}
    ].sort(()=> Math.random()-.5);
    Dialogo.rodar([
      {p:'narrador', cenario:'🍷'+d.emoji, t:`Encontro ${this.encontro+1} de 3: ${d.nome}.`},
      {p:'date', t:d.abertura, escolhas:opcoes}
    ]);
  },
  resultado(texto, deuRuim){
    if(deuRuim){ Jogo.candidoFoiHumilhado++; Jogo.addDrama(2); }
    this.encontro++;
    Dialogo.rodar([{p:'narrador', t:texto, cenario: deuRuim?'💨🪑':'🥂✨'}], ()=> this.proximoDate());
  },
  terminar(){
    const h = Jogo.candidoFoiHumilhado;
    const balanco = h===0 ? 'Três encontros SEM citar a Vera. Cientistas estudam o caso.'
      : h===3 ? 'Três fracassos em três tentativas. O garçom já anota "mesa pra um" quando ele chega.'
      : 'Saldo misto: parte da cidade acha ele charmoso, parte tem pena.';
    Dialogo.rodar([
      {p:'narrador', cenario:'🌙🍷', t:balanco},
      {p:'candido', t:'(no espelho do banheiro) Você é uma águia, Cândido. Uma águia… que sente falta do ninho.', drama:1}
    ], ()=> Jogo.cartela('CAPÍTULO FINAL', '"A Filha no Meio"',
        'Cristiane convoca a reunião que nenhum oficial de justiça conseguiu marcar.',
        ()=> Dialogo.rodar(ROTEIRO.final_intro)));
  }
};

const Final = {
  encerrar(tipo){
    const finais = {
      barraco:{
        titulo:'FIM (COM BARRACO)',
        texto:'Cristiane gritou por 40 minutos sem respirar. A vizinhança aplaudiu de pé. Vera e Cândido, em choque, concordaram em algo pela primeira vez em anos: "a menina puxou os dois". A casa? Continua lá. A terapia familiar? Começa terça.',
        drama:5
      },
      limite:{
        titulo:'FIM (COM LIMITE)',
        texto:'Silêncio na sala. Pela primeira vez, os dois ouviram. Vera guardou o alicate de arrancar placa. Cândido rasgou o anúncio do corretor. A casa ficou — não como troféu, mas como lar da Cristiane. E combinaram: briga de adulto se resolve entre adultos.',
        drama:0
      },
      vo:{
        titulo:'FIM (NA CASA DA VÓ)',
        texto:'Cristiane fez a mala em 8 minutos. Na casa da avó tem bolo, novela às nove e ZERO oficial de justiça. Vera e Cândido, sem plateia, perceberam que brigar sem público não tem graça nenhuma. Dizem que já foram vistos tomando café. No mesmo bar. Em mesas separadas. Por enquanto.',
        drama:2
      }
    };
    const f = finais[tipo];
    Jogo.addDrama(f.drama);
    $('#final-titulo').textContent = f.titulo;
    $('#final-texto').textContent = f.texto;
    $('#final-drama').textContent = Jogo.drama;
    Jogo.mostrar('tela-final');
  }
};
</script>
</template>

  }
  .mala:hover{transform:scale(1.08)}
  .mala .alca{width:22px;height:10px;border:3px solid rgba(0,0,0,.45);border-bottom:none;border-radius:6px 6px 0 0}
  .mala .corpo{
    width:100%;flex:1;border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,.45), inset 0 2px 0 rgba(255,255,255,.25);
    display:flex;align-items:center;justify-content:center;
    font-size:.6rem;font-weight:800;color:#fff;text-align:center;line-height:1.1;
    border:2px solid rgba(0,0,0,.25);
  }
  .mala.dela .corpo{
    background:linear-gradient(160deg,#ff8fb8,#ff5c98);
    border-color:#c9356e;
  }
  .mala.dela .corpo span{filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
  .aviso-flutua{
    position:absolute;font-weight:800;font-size:.85rem;color:var(--amarelo);
    background:rgba(0,0,0,.65);padding:4px 10px;border-radius:999px;
    animation:flutua .9s ease forwards;pointer-events:none;white-space:nowrap;z-index:9;
  }
  @keyframes flutua{to{transform:translateY(-40px);opacity:0}}

  /* ---------- TELAS ---------- */
  .tela{
    background:linear-gradient(180deg,#15375c,#102a47);
    border:1px solid rgba(255,255,255,.12);border-radius:22px;
    padding:40px 30px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.4);
    animation:pop .4s ease both;
  }
  @keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.tela{animation:none}.aviso-flutua{animation:none;opacity:0}}
  .tela h1{font-size:clamp(1.8rem,6vw,2.8rem);font-weight:900;color:#fff;line-height:1.1}
  .tela h1 em{font-style:italic;color:var(--azul)}
  .tela .grande{font-size:3.2rem;margin-bottom:8px}
  .tela p{color:rgba(244,247,251,.85);max-width:54ch;margin:12px auto 0;line-height:1.55}
  .tela .selo{
    display:inline-block;font-size:.7rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;
    border:2px solid var(--amarelo);color:var(--amarelo);border-radius:999px;padding:5px 16px;margin-bottom:12px;
  }
  .bio{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:18px}
  .bio span{
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);
    border-radius:999px;padding:6px 14px;font-size:.83rem;
  }
  .btn{
    font-family:'Fraunces',serif;font-weight:600;font-size:1.05rem;
    color:var(--tinta);background:var(--amarelo);
    border:none;border-radius:999px;padding:12px 30px;margin-top:24px;
    transition:transform .15s,box-shadow .2s;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(255,209,102,.35)}
  .btn.azul{background:var(--azul)}
  .cartao-fase{
    background:rgba(0,0,0,.25);border:1px dashed rgba(77,201,255,.4);
    border-radius:14px;padding:14px 18px;margin-top:16px;font-size:.95rem;color:rgba(244,247,251,.85);
  }
  .placar{margin-top:16px;font-size:.85rem;color:rgba(244,247,251,.55)}
  .rota{margin-top:14px;font-size:1rem;letter-spacing:.05em}
</style>

<main class="palco" id="palco" aria-live="polite"></main>

<script>
/* =====================================================================
   CADÊ MINHA MALA?
   Melise: doutoranda de TI na UFSC, viajante, trilheira — e recordista
   mundial em perder a mala. Ache a mala rosa dela em 5 fases!
   ===================================================================== */

const $ = s => document.getElementById(s);
const rnd = a => a[Math.floor(Math.random() * a.length)];

const FASES = [
  { local:'Aeroporto de Florianópolis 🛫', cenaEmoji:'🛫',
    intro:'Embarque pra Europa! Bolsa de doutorado aprovada, artigo aceito, passagem paga pela universidade. A Melise despachou a mala rosa… e a esteira já misturou tudo.',
    decoys:5, tempo:15, vel:0.55,
    erro:['Essa é do Seu Valdir, que vai pra Chapecó!','Essa mala tem 23kg de bergamota. Não é a sua.','Essa é da excursão da terceira idade!'] },
  { local:'Aeroporto de Lisboa 🇵🇹', cenaEmoji:'🇵🇹',
    intro:'Conexão em Lisboa. A mala foi despachada pro voo errado ("acontece", disse o atendente). Ela apareceu na esteira 7… junto com as malas de TRÊS voos diferentes.',
    decoys:8, tempo:14, vel:0.8,
    erro:['Essa é de um turista alemão MUITO bravo.','Essa tem um presunto inteiro dentro. Alfândega a caminho.','Essa é da tripulação. Larga. LARGA.'] },
  { local:'Trem Paris → Zurique 🚆', cenaEmoji:'🚆',
    intro:'Congresso em Paris: apresentação impecável, networking, croissant. Na volta, Melise desceu do trem em Zurique… e a mala continuou viajando no bagageiro. O trem foi parado na próxima estação!',
    decoys:10, tempo:12, vel:1.1,
    erro:['Essa é de um senhor suíço pontualíssimo e indignado.','Essa mala tem 40 queijos. Tentador, mas não é a sua.','Essa é a mala de outro brasileiro perdido. Vocês se cumprimentam.'] },
  { local:'Rodoviária nos Alpes 🏔️', cenaEmoji:'🏔️',
    intro:'Dia de trilha nos Alpes! No ônibus intermunicipal, a Melise cochilou (jet lag de doutoranda) e a mala desceu num ponto… ela em outro. O bagageiro da rodoviária é um caos alpino.',
    decoys:12, tempo:11, vel:1.35,
    erro:['Essa é de um alpinista. Tem 9 cordas e um piolet. Perigo.','Essa mochila é de um mochileiro australiano que também perdeu tudo.','Essa é da guia de trilha. Ela tá olhando feio.'] },
  { local:'Casa dos amigos europeus 🏡', cenaEmoji:'🏡',
    intro:'Última noite: jantar na casa dos amigos que conheceu no congresso. No dia seguinte, no aeroporto, a descoberta: A MALA FICOU LÁ. Na sala. Do lado do sofá. Corre que dá tempo antes do voo!',
    decoys:14, tempo:10, vel:1.6,
    erro:['Essa é a mala de outro hóspede. A casa recebe MUITA gente perdida.','Isso é uma caixa de vinho. Foco, Melise. FOCO.','Essa bolsa é da anfitriã. Constrangedor.'] }
];

const CORES = ['#5a6b85','#7a5230','#3f7d5a','#6b4a7a','#8a3a3a','#2f6b8a','#8a7430','#4a4a58','#356b45','#7a3a5e','#4f6b30','#30558a'];

let G = null;

function novoJogo(){
  G = { fase:0, vidas:3, erros:0, tempoTotal:0, timer:null, mover:null, tempoRestante:0, malas:[] };
}

/* ---------- TELAS ---------- */
function telaAbertura(){
  if (G) limparLoops();
  novoJogo();
  $('palco').innerHTML = `
    <div class="tela">
      <div class="grande">🙋‍♀️👍🧳</div>
      <h1>Cadê Minha <em>Mala?</em></h1>
      <p>Essa é a <strong>Melise</strong>: doutoranda de TI na <strong>UFSC</strong> (Florianópolis), apaixonada por trilha e por viajar. Acabou de embarcar pra Europa com tudo pago — bolsa de pesquisa, congresso, a vida acadêmica dos sonhos.</p>
      <p>Só tem UM detalhe: a Melise <strong>perde a mala</strong>. No avião, no trem, no ônibus, na casa dos outros. Sempre. Mas ela sempre acha de volta — e é aí que você entra.</p>
      <div class="bio">
        <span>💻 TI · UFSC</span>
        <span>🎓 Doutoranda bolsista</span>
        <span>🥾 Trilheira</span>
        <span>✈️ Europa a trabalho</span>
        <span>🧳 Recordista em mala perdida</span>
      </div>
      <p style="font-size:.92rem;margin-top:16px"><strong>Como jogar:</strong> em cada fase, encontre e clique na <strong style="color:var(--rosa-mala)">mala ROSA com a tag UFSC 💻</strong> no meio das malas alheias, antes que o tempo acabe. Clicou na mala errada? A Melise perde paciência (❤️). São 5 fases de puro perrengue europeu.</p>
      <button class="btn" onclick="telaFase()">Embarcar ✈️</button>
    </div>`;
}

function telaFase(){
  const f = FASES[G.fase];
  $('palco').innerHTML = `
    <div class="tela">
      <div class="selo">Fase ${G.fase+1} de ${FASES.length}</div>
      <div class="grande">${f.cenaEmoji}</div>
      <h1>${f.local}</h1>
      <p>${f.intro}</p>
      <div class="cartao-fase">🧳 Malas na área: <b>${f.decoys+1}</b> · ⏱️ Tempo: <b>${f.tempo}s</b> · ❤️ Paciência: <b>${G.vidas}</b></div>
      <button class="btn azul" onclick="iniciarFase()">Procurar a mala 🔎</button>
    </div>`;
}

function iniciarFase(){
  const f = FASES[G.fase];
  G.tempoRestante = f.tempo;
  $('palco').innerHTML = `
    <div class="hud">
      <span class="fase-nome">${f.local}</span>
      <span class="vidas">❤️ ${G.vidas}</span>
      <span class="cron" id="cron">${f.tempo}s</span>
    </div>
    <div id="area"><div class="fundo-cena">${f.cenaEmoji}</div></div>
    <p style="text-align:center;margin-top:10px;font-size:.85rem;color:rgba(244,247,251,.55)">Clique na mala <b style="color:var(--rosa-mala)">ROSA · UFSC 💻</b></p>`;

  criarMalas(f);
  moverMalas();

  G.timer = setInterval(()=>{
    G.tempoRestante--;
    G.tempoTotal++;
    $('cron').textContent = G.tempoRestante + 's';
    if (G.tempoRestante <= 0) tempoEsgotado();
  }, 1000);
}

function criarMalas(f){
  const area = $('area');
  const W = area.clientWidth, H = area.clientHeight;
  G.malas = [];

  const total = f.decoys + 1;
  const idxDela = Math.floor(Math.random() * total);

  for (let i = 0; i < total; i++){
    const el = document.createElement('div');
    const dela = i === idxDela;
    el.className = 'mala' + (dela ? ' dela' : '');
    const cor = CORES[i % CORES.length];
    el.innerHTML = `<div class="alca"></div><div class="corpo" ${dela?'':'style="background:linear-gradient(160deg,'+cor+','+cor+'cc)"'}>${dela?'<span>UFSC<br>💻✈️</span>':''}</div>`;
    const m = {
      el, dela,
      x: Math.random() * (W - 60),
      y: Math.random() * (H - 70),
      vx: (Math.random() - .5) * 2 * f.vel,
      vy: (Math.random() - .5) * 2 * f.vel
    };
    if (Math.abs(m.vx) < 0.2) m.vx = 0.3 * f.vel;
    if (Math.abs(m.vy) < 0.2) m.vy = 0.3 * f.vel;
    el.style.left = m.x + 'px';
    el.style.top = m.y + 'px';
    el.onpointerdown = e => { e.preventDefault(); clicouMala(m); };
    area.appendChild(el);
    G.malas.push(m);
  }
}

function moverMalas(){
  const area = $('area');
  G.mover = setInterval(()=>{
    if (!area.isConnected) return limparLoops();
    const W = area.clientWidth, H = area.clientHeight;
    G.malas.forEach(m=>{
      m.x += m.vx * 3; m.y += m.vy * 3;
      if (m.x <= 0 || m.x >= W - 58) m.vx *= -1;
      if (m.y <= 0 || m.y >= H - 68) m.vy *= -1;
      m.x = Math.max(0, Math.min(W - 58, m.x));
      m.y = Math.max(0, Math.min(H - 68, m.y));
      m.el.style.left = m.x + 'px';
      m.el.style.top = m.y + 'px';
    });
  }, 30);
}

function clicouMala(m){
  if (m.dela){
    limparLoops();
    G.fase++;
    if (G.fase >= FASES.length) return telaVitoria();
    return telaAchou();
  }
  // mala errada
  G.vidas--; G.erros++;
  m.el.style.opacity = .3;
  m.el.style.pointerEvents = 'none';
  avisar(m.x, m.y, rnd(FASES[Math.min(G.fase, FASES.length-1)].erro));
  document.querySelector('.vidas').textContent = '❤️ ' + G.vidas;
  if (G.vidas <= 0){ limparLoops(); telaDerrota('paciencia'); }
}

function avisar(x, y, txt){
  const area = $('area');
  if (!area) return;
  const a = document.createElement('div');
  a.className = 'aviso-flutua';
  a.textContent = txt;
  a.style.left = Math.min(x, area.clientWidth - 220) + 'px';
  a.style.top = Math.max(10, y - 20) + 'px';
  area.appendChild(a);
  setTimeout(()=>a.remove(), 900);
}

function tempoEsgotado(){
  limparLoops();
  telaDerrota('tempo');
}

function limparLoops(){
  clearInterval(G.timer); clearInterval(G.mover);
}

function telaAchou(){
  const frases = [
    'ACHOU! A mala rosa, intacta, com o adesivo da UFSC brilhando. A Melise abraça a mala. A mala não retribui, mas sente.',
    'Lá está ela! A funcionária do achados e perdidos já reconhece a Melise pelo nome. E pela mala.',
    'Recuperada! Dentro, tudo no lugar: notebook, caderno de campo, 3 pares de bota de trilha e um chimarrão de emergência.',
    'A mala voltou! A Melise jura solenemente que "nunca mais" vai perder. Ninguém acredita, nem ela.'
  ];
  $('palco').innerHTML = `
    <div class="tela">
      <div class="selo" style="border-color:var(--rosa-mala);color:var(--rosa-mala)">Mala recuperada!</div>
      <div class="grande">🧳💕</div>
      <h1>Ufa!</h1>
      <p>${rnd(frases)}</p>
      <p class="rota">${FASES.map((f,i)=> i < G.fase ? '✅' : '⬜').join(' → ')}</p>
      <button class="btn" onclick="telaFase()">Próxima etapa da viagem →</button>
    </div>`;
}

function telaVitoria(){
  $('palco').innerHTML = `
    <div class="tela">
      <div class="selo" style="border-color:var(--rosa-mala);color:var(--rosa-mala)">Missão cumprida · 5/5 malas recuperadas</div>
      <div class="grande">🙋‍♀️👍🧳🏆</div>
      <h1>A mala <em>sempre</em> volta!</h1>
      <p>Avião, aeroporto, trem, ônibus e até a sala dos amigos: a mala rosa fugiu 5 vezes e voltou 5 vezes. A Melise pousou em Floripa com a mala na mão, o doutorado em dia e histórias pra encher três defesas de tese.</p>
      <p>No grupo dos amigos, a enquete já está aberta: <em>"onde a Melise vai perder a mala na próxima viagem?"</em>. Porque próxima viagem, claro, <strong>já está marcada</strong>. A mala, coitada, já tem mais milhas que muito piloto — e uma tag nova: <strong>"SE ENCONTRAR, DEVOLVER PARA A UFSC 💻"</strong>.</p>
      <div class="placar">Erros de mala alheia: ${G.erros} · paciência restante: ${'❤️'.repeat(Math.max(G.vidas,0)) || '—'} · tempo de perrengue: ${G.tempoTotal}s</div>
      <button class="btn" onclick="telaAbertura()">Nova viagem ↺</button>
    </div>`;
}

function telaDerrota(motivo){
  const msg = motivo === 'tempo'
    ? 'O tempo acabou e a mala <strong>seguiu viagem sozinha</strong>. Consta que foi vista em Istambul, depois em Praga, e mandou lembranças. A Melise preencheu o 47º formulário de bagagem extraviada da carreira. De cabeça. Sem olhar.'
    : 'A paciência acabou! Depois de abrir a mala errada pela enésima vez (e quase levar um sermão em alemão), a Melise sentou no chão do saguão e aceitou: hoje a mala venceu.';
  $('palco').innerHTML = `
    <div class="tela">
      <div class="selo" style="border-color:var(--azul);color:var(--azul)">A mala escapou…</div>
      <div class="grande">🧳💨</div>
      <h1>Extraviada. <em>De novo.</em></h1>
      <p>${msg}</p>
      <p>Mas relaxa: mala da Melise é igual boomerang — <strong>sempre volta</strong>. Só precisa de mais uma tentativa (e de um milagre logístico).</p>
      <div class="placar">Chegou até a fase ${G.fase+1} de ${FASES.length} · erros: ${G.erros}</div>
      <button class="btn" onclick="telaAbertura()">Tentar de novo ↺</button>
    </div>`;
}

telaAbertura();
</script>
</template>

</body>
</html>
