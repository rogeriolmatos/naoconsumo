<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#040b22">
<title>Temporizador de Não Consumo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#030a1f;
    --bg-1:#061233;
    --ink:#eaf2ff;
    --ink-dim:#9fb4dd;
    --ink-faint:#5d72a0;
    --blue-cyan:#3ee0ff;
    --blue-sky:#4aa8ff;
    --blue-deep:#6b8bff;
    --glass:rgba(120,170,255,0.07);
    --glass-line:rgba(140,190,255,0.16);
    --radius:26px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Sora',system-ui,sans-serif;
    background:var(--bg-0);
    color:var(--ink);
    min-height:100dvh;
    overflow-x:hidden;
    position:relative;
    -webkit-font-smoothing:antialiased;
  }
  .aura{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .aura::before,.aura::after{
    content:"";position:absolute;border-radius:50%;filter:blur(70px);opacity:.55;
  }
  .aura::before{
    width:75vw;height:75vw;left:-25vw;top:-18vh;
    background:radial-gradient(circle, #1b6dff 0%, rgba(27,109,255,0) 70%);
    animation:drift1 16s ease-in-out infinite alternate;
  }
  .aura::after{
    width:80vw;height:80vw;right:-30vw;bottom:-12vh;
    background:radial-gradient(circle, #19c6ff 0%, rgba(25,198,255,0) 70%);
    animation:drift2 19s ease-in-out infinite alternate;
  }
  @keyframes drift1{to{transform:translate(8vw,6vh) scale(1.12);}}
  @keyframes drift2{to{transform:translate(-7vw,-5vh) scale(1.15);}}
  .grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.4;
    background:linear-gradient(180deg, rgba(3,10,31,.2), rgba(3,10,31,.85));}

  .wrap{
    position:relative;z-index:2;
    max-width:460px;margin:0 auto;
    padding:calc(env(safe-area-inset-top) + 22px) 18px calc(env(safe-area-inset-bottom) + 26px);
    display:flex;flex-direction:column;gap:18px;min-height:100dvh;
  }

  .top{display:flex;flex-direction:column;gap:14px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{width:9px;height:9px;border-radius:50%;
    background:var(--blue-cyan);box-shadow:0 0 14px var(--blue-cyan);
    animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse{50%{opacity:.35;transform:scale(.7);}}
  .brand .kicker{font-size:11.5px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;}

  .cheer{
    border-radius:var(--radius);
    background:linear-gradient(135deg, rgba(62,224,255,.16), rgba(107,139,255,.10));
    border:1px solid var(--glass-line);
    padding:18px 20px;
    box-shadow:0 0 40px rgba(40,130,255,.12) inset, 0 8px 30px rgba(0,0,0,.3);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  .cheer .hi{font-size:13px;color:var(--blue-cyan);font-weight:700;letter-spacing:.14em;text-transform:uppercase;}
  .cheer .msg{margin-top:6px;font-size:16.5px;line-height:1.45;color:var(--ink);font-weight:400;}
  .cheer .msg b{font-weight:700;color:#fff;}

  .cards{display:flex;flex-direction:column;gap:18px;flex:1;}
  .card{
    position:relative;
    border-radius:var(--radius);
    background:var(--glass);
    border:1px solid var(--glass-line);
    padding:22px 22px 20px;
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    box-shadow:0 10px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  .card::before{
    content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;
    background:linear-gradient(140deg, var(--c1), transparent 45%);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;opacity:.7;pointer-events:none;
  }
  .card .halo{position:absolute;width:160px;height:160px;border-radius:50%;
    top:-70px;right:-50px;filter:blur(36px);opacity:.5;background:var(--c1);}

  .c-head{display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative;}
  .c-title{display:flex;align-items:center;gap:11px;}
  .c-ico{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;
    background:rgba(255,255,255,.06);border:1px solid var(--glass-line);font-size:18px;}
  .c-name{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);font-weight:600;line-height:1.2;}
  .c-since{font-size:11px;color:var(--ink-faint);margin-top:2px;letter-spacing:.04em;}
  .badge{font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
    color:var(--c1);padding:6px 11px;border-radius:999px;background:rgba(255,255,255,.04);
    border:1px solid var(--glass-line);white-space:nowrap;}

  .hero{display:flex;align-items:baseline;gap:10px;margin:18px 0 4px;position:relative;}
  .hero .big{font-size:64px;font-weight:800;line-height:.9;letter-spacing:-.02em;
    color:#fff;font-variant-numeric:tabular-nums;
    text-shadow:0 0 26px var(--c1);}
  .hero .unit{font-size:15px;color:var(--ink-dim);font-weight:500;letter-spacing:.02em;}

  .units{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:16px;position:relative;}
  .u{
    background:rgba(255,255,255,.035);
    border:1px solid rgba(140,190,255,.10);
    border-radius:14px;padding:11px 4px 9px;text-align:center;
  }
  .u .v{font-size:21px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;line-height:1;
    display:inline-block;}
  .u .l{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-top:6px;font-weight:600;}
  .u .v.tick{animation:tick .5s cubic-bezier(.2,.9,.3,1.2);}
  @keyframes tick{0%{transform:translateY(-22%);opacity:0;filter:blur(2px);}60%{opacity:1;}100%{transform:translateY(0);}}

  .u.sec .v{color:var(--c1);text-shadow:0 0 16px var(--c1);}

  /* ---- card duplo (sub-contadores) ---- */
  .subs{display:flex;flex-direction:column;gap:16px;margin-top:18px;position:relative;}
  .sub{position:relative;}
  .sub + .sub{border-top:1px solid var(--glass-line);padding-top:16px;}
  .sub-head{display:flex;flex-direction:column;gap:3px;}
  .sub-label{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--ink-dim);font-weight:600;}
  .sub-label .si{font-size:16px;}
  .sub-since{font-size:10.5px;color:var(--ink-faint);letter-spacing:.03em;}
  .hero.sm{margin:11px 0 2px;}
  .hero.sm .big{font-size:46px;}

  .state{text-align:center;color:var(--ink-dim);font-size:14px;padding:40px 10px;line-height:1.5;}
  .state b{color:#fff;}

  .foot{margin-top:auto;text-align:center;font-size:11px;color:var(--ink-faint);letter-spacing:.06em;
    padding-top:6px;}
  .foot .live{display:inline-flex;align-items:center;gap:6px;}
  .foot .live i{width:6px;height:6px;border-radius:50%;background:#3ee0ff;box-shadow:0 0 8px #3ee0ff;
    animation:pulse 2s infinite;}
</style>
</head>
<body>
  <div class="aura"></div>
  <div class="grain"></div>

  <main class="wrap">
    <header class="top">
      <div class="brand">
        <span class="dot"></span>
        <span class="kicker">Temporizador de Não Consumo</span>
      </div>
      <div class="cheer">
        <div class="hi">Parabéns 🎉</div>
        <div class="msg" id="cheerMsg">Você está construindo algo grande, um segundo de cada vez.</div>
      </div>
    </header>

    <section class="cards" id="cards">
      <div class="state" id="state">Carregando os dados…</div>
    </section>

    <footer class="foot">
      <span class="live"><i></i>Atualizando em tempo real</span>
    </footer>
  </main>

<script>
  /* =======================================================================
     COLE AQUI O LINK CSV DA SUA PLANILHA PUBLICADA NA WEB (opcional)
     Enquanto não estiver configurado, o painel usa os dados do FALLBACK.
     ======================================================================= */
  const CSV_URL = "COLE_O_LINK_CSV_AQUI";

  /* Dados padrão (usados quando a planilha não está configurada/carregada).
     - Card simples: tem "start".
     - Card duplo (como DOCES): tem "subs" com vários contadores no mesmo box. */
  const FALLBACK = [
    {name:'Sem Álcool', icon:'🍷', start:'2026-01-27', color:'#3ee0ff'},
    {name:'Doces', icon:'🍰', color:'#6b8bff', subs:[
      {label:'Sem Sobremesas', icon:'🍮', start:'2026-06-19'},
      {label:'Sem Bolos de Aniversário', icon:'🎂', start:'2026-06-13'}
    ]},
    {name:'Sem Frituras', icon:'🍟', start:'2026-06-08', color:'#4aa8ff'},
    {name:'Sem Bebidas Ultraprocessadas', icon:'🥤', start:'2026-06-09', color:'#5ac8ff'}
  ];

  const PALETTE = ['#3ee0ff','#6b8bff','#4aa8ff','#5ac8ff','#7d8dff','#38c6ff','#5fd0ff'];
  const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

  // -------- parser de CSV --------
  function parseCSV(text){
    const rows=[]; let row=[], field='', inQuotes=false;
    for(let i=0;i<text.length;i++){
      const ch=text[i];
      if(inQuotes){
        if(ch==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQuotes=false; }
        else field+=ch;
      }else{
        if(ch==='"') inQuotes=true;
        else if(ch===',') {row.push(field);field='';}
        else if(ch==='\n'){row.push(field);rows.push(row);row=[];field='';}
        else if(ch==='\r'){}
        else field+=ch;
      }
    }
    if(field.length||row.length){row.push(field);rows.push(row);}
    return rows.filter(r=>r.some(c=>c.trim()!==''));
  }
  function rowsToObjects(rows){
    if(!rows.length) return [];
    const headers=rows[0].map(h=>h.trim().toLowerCase());
    return rows.slice(1).map(r=>{
      const o={}; headers.forEach((h,idx)=> o[h]=(r[idx]||'').trim()); return o;
    });
  }

  // -------- datas --------
  function parseDate(str){
    str=(str||'').trim(); if(!str) return null;
    let m;
    if((m=str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/))) return new Date(+m[1],+m[2]-1,+m[3],0,0,0);
    if((m=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/))) return new Date(+m[3],+m[2]-1,+m[1],0,0,0);
    const d=new Date(str); return isNaN(d)?null:d;
  }
  function sinceLabel(d){ return `Desde ${d.getDate()} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`; }

  // -------- diferença calendário-precisa --------
  function diff(start, now){
    if(now < start) now = start;
    let y=now.getFullYear()-start.getFullYear();
    let mo=now.getMonth()-start.getMonth();
    let d=now.getDate()-start.getDate();
    let h=now.getHours()-start.getHours();
    let mi=now.getMinutes()-start.getMinutes();
    let s=now.getSeconds()-start.getSeconds();
    if(s<0){s+=60;mi--;}
    if(mi<0){mi+=60;h--;}
    if(h<0){h+=24;d--;}
    if(d<0){ const pm=new Date(now.getFullYear(),now.getMonth(),0).getDate(); d+=pm; mo--; }
    if(mo<0){mo+=12;y--;}
    const totalDays=Math.floor((now-start)/86400000);
    return {y,mo,d,h,mi,s,totalDays};
  }
  function pad(n){return String(n).padStart(2,'0');}

  // -------- montagem --------
  const cardsEl = document.getElementById('cards');
  let COUNTERS = []; // cada item: {start, refs}

  function unitsGridHTML(){
    return `
      <div class="units">
        <div class="u"><span class="v" data-u="y">0</span><div class="l">Anos</div></div>
        <div class="u"><span class="v" data-u="mo">0</span><div class="l">Meses</div></div>
        <div class="u"><span class="v" data-u="d">0</span><div class="l">Dias</div></div>
        <div class="u"><span class="v" data-u="h">00</span><div class="l">Horas</div></div>
        <div class="u sec"><span class="v" data-u="combo">00</span><div class="l">Min·Seg</div></div>
      </div>`;
  }
  function collectRefs(root){
    return {
      big: root.querySelector('[data-r="big"]'),
      days: root.querySelector('[data-r="days"]'),
      u:{
        y: root.querySelector('[data-u="y"]'),
        mo: root.querySelector('[data-u="mo"]'),
        d: root.querySelector('[data-u="d"]'),
        h: root.querySelector('[data-u="h"]'),
        combo: root.querySelector('[data-u="combo"]'),
      },
      prev:{}
    };
  }

  function buildCards(list){
    cardsEl.innerHTML='';
    COUNTERS=[];
    let count=0;

    list.forEach((item,i)=>{
      const c1=(item.color&&item.color.trim())?item.color.trim():PALETTE[i%PALETTE.length];
      const card=document.createElement('article');
      card.className='card';
      card.style.setProperty('--c1', c1);

      if(item.subs && item.subs.length){
        // ----- card duplo -----
        const subs=item.subs.map(s=>({label:s.label||'', icon:s.icon||'', start:parseDate(s.start)})).filter(s=>s.start);
        if(!subs.length) return;
        let subsHTML='';
        subs.forEach((s,si)=>{
          subsHTML+=`
            <div class="sub" data-sub="${si}">
              <div class="sub-head">
                <div class="sub-label"><span class="si">${s.icon}</span>${s.label}</div>
                <div class="sub-since">${sinceLabel(s.start)}</div>
              </div>
              <div class="hero sm">
                <span class="big" data-r="big">0</span>
                <span class="unit">dias firme</span>
              </div>
              ${unitsGridHTML()}
            </div>`;
        });
        card.innerHTML=`
          <div class="halo"></div>
          <div class="c-head">
            <div class="c-title">
              <div class="c-ico">${item.icon||'🍰'}</div>
              <div>
                <div class="c-name">${item.name||'Doces'}</div>
                <div class="c-since">Aberto a ocasiões especiais</div>
              </div>
            </div>
          </div>
          <div class="subs">${subsHTML}</div>`;
        cardsEl.appendChild(card);
        card.querySelectorAll('.sub').forEach((subEl,si)=>{
          COUNTERS.push({start:subs[si].start, refs:collectRefs(subEl), label:subs[si].label, icon:subs[si].icon});
        });
        count++;
      }else{
        // ----- card simples -----
        const start=parseDate(item.start);
        if(!start) return;
        card.innerHTML=`
          <div class="halo"></div>
          <div class="c-head">
            <div class="c-title">
              <div class="c-ico">${item.icon||'✨'}</div>
              <div>
                <div class="c-name">${item.name||'Sem nome'}</div>
                <div class="c-since">${sinceLabel(start)}</div>
              </div>
            </div>
            <div class="badge" data-r="days">— dias</div>
          </div>
          <div class="hero">
            <span class="big" data-r="big">0</span>
            <span class="unit">dias firme</span>
          </div>
          ${unitsGridHTML()}`;
        cardsEl.appendChild(card);
        COUNTERS.push({start:start, refs:collectRefs(card), label:(item.name||'Sem nome'), icon:(item.icon||'✨')});
        count++;
      }
    });

    if(!count){
      cardsEl.innerHTML='<div class="state">Nenhum dado válido encontrado.</div>';
      return false;
    }
    return true;
  }

  function setVal(el,val,store,key){
    if(!el) return;
    const str=String(val);
    if(store[key]!==str){
      store[key]=str; el.textContent=str;
      el.classList.remove('tick'); void el.offsetWidth; el.classList.add('tick');
    }
  }

  // ----- mensagens motivacionais: rodízio geral por todas as áreas -----
  function lab(c){ return (c.label||'').toLowerCase(); }
  function daysOf(c){ return diff(c.start, new Date()).totalDays; }

  const areaTpl = [
    (c,d)=>`${c.icon} Você está há <b>${d}</b> dias ${lab(c)}. Continue firme!`,
    (c,d)=>`${c.icon} <b>${d}</b> dias ${lab(c)} — muito orgulho de você!`,
    (c,d)=>`${c.icon} Já são <b>${d}</b> dias ${lab(c)}. Cada dia conta.`
  ];
  function areaMsg(c, k){
    const d=daysOf(c);
    if(d===0) return `${c.icon} Recomeço hoje em ${lab(c)} — ocasião especial vale! Amanhã a contagem já cresce. 😉`;
    return areaTpl[k % areaTpl.length](c,d);
  }
  const geralTpl = [
    ()=>`🔥 No total, já são <b>${COUNTERS.reduce((a,c)=>a+daysOf(c),0)}</b> dias de escolhas saudáveis somadas!`,
    ()=>`💪 Você está cuidando de <b>${COUNTERS.length}</b> metas ao mesmo tempo. Que disciplina!`,
    ()=>`🏆 Seu maior recorde agora é <b>${COUNTERS.reduce((m,c)=>Math.max(m,daysOf(c)),0)}</b> dias. Imparável!`
  ];

  // monta a sequência alternando áreas e mensagens gerais
  function buildCheerSlots(){
    const slots=[];
    COUNTERS.forEach((c,i)=>{
      slots.push(k=>areaMsg(c,k));
      if(i%2===1){ const gi=Math.floor(i/2)%geralTpl.length; slots.push(()=>geralTpl[gi]()); }
    });
    geralTpl.forEach((g,gi)=>slots.push(()=>geralTpl[gi]()));
    return slots;
  }

  let cheerSlots=[], cheerIdx=0;
  function rotateCheer(){
    if(!cheerSlots.length) return;
    const el=document.getElementById('cheerMsg');
    el.style.opacity=0;
    setTimeout(()=>{
      el.innerHTML=cheerSlots[cheerIdx % cheerSlots.length](cheerIdx);
      el.style.transition='opacity .5s'; el.style.opacity=1; cheerIdx++;
    },300);
  }

  function tick(){
    const now=new Date();
    COUNTERS.forEach(c=>{
      const r=c.refs;
      const x=diff(c.start, now);
      setVal(r.big, x.totalDays, r.prev,'big');
      if(r.days) r.days.textContent=`${x.totalDays} dias`;
      setVal(r.u.y, x.y, r.prev,'y');
      setVal(r.u.mo, x.mo, r.prev,'mo');
      setVal(r.u.d, x.d, r.prev,'d');
      setVal(r.u.h, pad(x.h), r.prev,'h');
      setVal(r.u.combo, pad(x.mi)+':'+pad(x.s), r.prev,'combo');
    });
  }

  let started=false;
  function start(list){
    if(!buildCards(list)) return;
    cheerSlots=buildCheerSlots();
    if(!started){
      started=true;
      cheerIdx=Math.floor(Math.random()*cheerSlots.length); // começa numa área aleatória
      tick(); rotateCheer();
      setInterval(tick,1000);
      setInterval(rotateCheer,6000);
    }else{ tick(); }
  }

  async function load(){
    if(!CSV_URL || CSV_URL.indexOf('COLE_O_LINK')!==-1){ start(FALLBACK); return; }
    try{
      const sep=CSV_URL.indexOf('?')!==-1?'&':'?';
      const res=await fetch(CSV_URL+sep+'cacheBust='+Date.now());
      if(!res.ok) throw new Error('HTTP '+res.status);
      const objs=rowsToObjects(parseCSV(await res.text()));
      start(objs.length?objs:FALLBACK);
    }catch(e){ console.error('Falha ao carregar planilha:',e); start(FALLBACK); }
  }


  load();
</script>
</body>
</html>
